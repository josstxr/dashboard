<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Actualizando Healthy-T</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #07090b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(420px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 800;
    }

    p {
      margin: 0;
      color: #c5cbd3;
      font-size: 15px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>Actualizando Healthy-T</h1>
    <p>Limpiando la version anterior para cargar la app mas reciente.</p>
  </main>
  <script>
    async function clearHealthyT() {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }

      if ('caches' in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
      }

      try {
        window.localStorage.removeItem('healthy-t-web-build-version');
      } catch (_) {}

      window.location.replace('/?fresh=' + Date.now());
    }

    clearHealthyT();
  </script>
</body>
</html>
